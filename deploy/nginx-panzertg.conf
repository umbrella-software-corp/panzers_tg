# Panzer TG: статика клиента + прокси API/WS на Node (:8080).
# HTTPS добавит certbot --nginx поверх этого конфига.
server {
    listen 80;
    listen [::]:80;
    server_name panzertg.online www.panzertg.online;

    root /opt/panzers/client/dist;
    index index.html;

    # статика Vite с хешами — кэшируем надолго
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # спрайты и прочая статика
    location /sprites/ {
        expires 7d;
        try_files $uri =404;
    }

    # API и вебсокеты — на Node
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # админка (GET /admin) — на Node, иначе SPA-фоллбэк отдаст игру
    location /admin {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /ws {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        # реальный IP игрока: без него сервер видит всех как 127.0.0.1 и лимит
        # MAX_PER_IP режет ВЕСЬ онлайн после 30 сокетов
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
        # риалтайм: не копить поток — слать кадры игроку сразу, без буфера/Нэйгла
        proxy_buffering off;
        tcp_nodelay on;
    }

    # Amplitude first-party прокси: события клиента идут на НАШ домен (/amp/2/httpapi),
    # nginx переправляет их на api2.amplitude.com. Так запрос «свой» и блокировщики
    # трекеров (EasyPrivacy режет api2.amplitude.com напрямую) его не трогают.
    location /amp/ {
        proxy_pass https://api2.amplitude.com/;
        proxy_set_header Host api2.amplitude.com;
        proxy_ssl_server_name on; # SNI к TLS Amplitude
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; # реальный IP игрока для гео
        proxy_set_header Referer ""; # не светим внутренний путь
    }

    # SPA-фоллбэк. index.html НЕ кэшируем: он указывает на хешированный бандл из
    # /assets/. Иначе после деплоя Telegram/браузер держат старый index.html, тянут
    # удалённый старый бандл → 404 → «ничего не работает». Хеш-ассеты кэшируются (выше).
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        expires off;
    }
}
