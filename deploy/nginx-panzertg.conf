# Panzer TG: статика клиента + прокси API/WS на Node (:8080).
# HTTPS добавит certbot --nginx поверх этого конфига.
server {
    listen 80;
    listen [::]:80;
    server_name panzertg.online www.panzertg.online;

    root /opt/panzers/client/dist;
    index index.html;

    # статика Vite с хешами — кэшируем надолго
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # спрайты и прочая статика
    location /sprites/ {
        expires 7d;
        try_files $uri =404;
    }

    # API и вебсокеты — на Node
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /ws {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
    }

    # SPA-фоллбэк
    location / {
        try_files $uri $uri/ /index.html;
    }
}
