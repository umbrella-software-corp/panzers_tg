# VictoriaMetrics встроенный скрейпер (Prometheus-формат). Тянет метрики с cadvisor
# (по контейнерам) и node-exporter (хост) по внутренней сети monitoring.
global:
  scrape_interval: 15s

scrape_configs:
  - job_name: cadvisor
    static_configs:
      - targets: ['cadvisor:8080']
    metric_relabel_configs:
      # cAdvisor на этом хосте НЕ обогащает метрики docker-именем `name` (встроенный
      # docker-клиент не получает список контейнеров от Docker 29 — проверено). Выводим
      # стабильный label `container`: берём `name`, если он есть, иначе 12-симв. docker-id
      # из cgroup-пути `id` (/docker/<hash>). → панели «по поду» непусты на любом хосте.
      - source_labels: [name]
        regex: (.+)
        target_label: container
        replacement: $1
      - source_labels: [container, id]
        separator: ';'
        # Покрывает оба cgroup-драйвера: cgroupfs `/docker/<hash>` и systemd
        # `/system.slice/docker-<hash>.scope`. Срабатывает только если container ещё
        # пуст (имя не пришло) — на наших хостах с overlay2 имя есть, это fallback.
        regex: ';(?:/docker/|/system\.slice/docker-)([0-9a-f]{12})[0-9a-f]*(?:\.scope)?'
        target_label: container
        replacement: $1
  - job_name: node-exporter
    static_configs:
      - targets: ['node-exporter:9100']
  - job_name: victoriametrics
    static_configs:
      - targets: ['victoriametrics:8428']
