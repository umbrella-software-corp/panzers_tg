name: Deploy

# Build images in CI → push to GHCR → pull-and-run on the VPS.
#
#   push to main         → staging    (stg.panzers.tg)
#   tag  panzers/X.Y.Z    → production (panzers.tg)
#
# `*` in a tag filter matches anything except `/`, so panzers/*.*.* enforces three
# numeric-ish segments (panzers/1.0.0, panzers/12.3.4, ...). All config lives in the
# GitHub Environments `staging` / `production` (secrets + variables) — nothing at
# repo level. The actual work is in the reusable workflow below; these two jobs
# just pick the environment from the trigger.

on:
  push:
    branches: [main]
    tags: ['panzers/*.*.*']
    paths-ignore: ['**/*.md']

permissions:
  contents: read
  packages: write

jobs:
  staging:
    if: github.ref == 'refs/heads/main'
    uses: ./.github/workflows/_deploy.yml
    with:
      environment: staging
    secrets: inherit

  production:
    if: startsWith(github.ref, 'refs/tags/panzers/')
    uses: ./.github/workflows/_deploy.yml
    with:
      environment: production
    secrets: inherit
